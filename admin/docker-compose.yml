services:
  admin:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - .:/app
      - admin_node_modules:/app/node_modules
      - admin_next_cache:/app/.next
    command: ["npm","run","dev","--","--hostname","0.0.0.0","--port","3000"]

volumes:
  admin_node_modules:
  admin_next_cache:
